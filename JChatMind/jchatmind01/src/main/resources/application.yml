spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jchatmind
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    retry:
      # ★ 由 ResilienceRetryConfig 定制：仅对 IOException 等网络层瞬断进行内置重试。
      # 业务级/限流级异常（400/429/529）直接放行给 ErrorRecoveryEngine 处理。
      max-attempts: 2
      backoff:
        initial-interval: 2000
        multiplier: 2
        max-interval: 30000
    deepseek:
      api-key: ${API-KEY-deepseek}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    zhipuai:
      api-key: ${API-KEY-zhipuai}
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.6
    mcp:
      client:
        stdio:
          connections:
            bocha-search:
              command: node
              args:
                - "./JChatMind/jchatmind01/mcp/bocha-mcp.js"
              env:
                BOCHA_API_KEY: ${API-KEY-bocha-search}
                BOCHA_ENDPOINT: "https://api.bochaai.com/v1/web-search"

  mail:
    host: smtp.qq.com
    port: 587
    username: 3130567547@qq.com
    password: ${QQ-SMTP}
    default-encoding: utf-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

mybatis:
  type-aliases-package: com.kaer.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kaer.typehandler

#document:
#  storage:
#    base-path: ./data/documents

document:
  storage:
    base-path: ./jchatmind01/data/documents


# ========================================================================
# 韧性引擎配置（Error Recovery Engine）
# 控制 LLM 调用层的自愈策略：限流退避、备胎切换、截断续写、上下文降级
# ========================================================================
resilience:
  # 备胎模型映射：当当前模型不可用时自动切换
  fallback:
    deepseek-chat: glm-4.6
    glm-4.6: deepseek-chat
  # 退避策略参数
  backoff:
    base-delay-ms: 500        # 基础延迟（毫秒），公式：500ms * (2 ^ attempt)
    max-delay-ms: 30000       # 最大延迟上限（毫秒）
    jitter-ratio: 0.25        # 随机 Jitter 比例 [0, 25%]
    fallback-529-threshold: 3 # 连续 529 错误触发备胎切换的阈值
  # Max Tokens 截断 / 续写策略
  continuation:
    max-retries: 3            # 续写最大重试次数（不含首次无痕升级）
    upgraded-tokens: 64000    # 无痕升级时的 max_tokens 值（64K）
  # 上下文超限降级策略
  context-length:
    max-retries: 1            # 上下文超限摘要降级最多尝试次数
    reserved-recent-messages: 3  # 降级后保留的最近关键对话条数

# ========================================================================
# 工具响应全局缓存配置（Tool Response Global Cache）
# 控制超大工具响应的 Redis 缓存 + 按需阅读行为
# ========================================================================
jchatmind:
  tool-cache:
    enabled: true                    # 总开关：是否启用工具响应缓存（关闭后全局退化为硬截断）
    ttl-seconds: 600                 # Redis 缓存 TTL（秒），默认 10 分钟
    trigger-tokens: 4000             # 触发缓存的 token 阈值
    shown-tokens: 2000               # 截断后展示给 LLM 的 token 数
    read-max-chars: 16000            # ReadCacheTool 单次最大读取字符数

# ========================================================================
# 多 Agent 协作配置（MessageBus + Teammate）
# ========================================================================
# ========================================================================
# 上下文压缩配置（Context Compactor）
# 四级降级策略：L3(工具响应截断) → L2(历史工具清理→Redis) → L1(滑动窗口) → L4(LLM摘要)
# ========================================================================
  context-compactor:
    enabled: true                       # 总开关
    l1:
      keep-first-k: 10                  # L1 滑动窗口：保留开头 K 条消息
      keep-last-n: 30                   # L1 滑动窗口：保留末尾 N 条消息
    l2:
      max-kept-results: 5               # L2 历史清理：保留最近 M 条工具结果
      cache-ttl-seconds: 604800         # L2 归档 Redis 缓存 TTL（秒），默认 7 天
    l4:
      enabled: true                     # L4 LLM 摘要：是否启用
      cheap-model: null                 # L4 廉价模型，null = 使用主模型

# ========================================================================
# 多 Agent 协作配置（MessageBus + Teammate）
# ========================================================================
agent:
  # 消息总线：基于 .jsonl 文件的 Agent 间异步通信
  messagebus:
    inbox-dir: ./jchatmind01/data/inboxes   # 收件箱文件存储目录
  # 队友配置：后台 Teammate Worker 的运行参数
  teammate:
    max-steps: 20                            # JChatMind 单轮最大 think-execute 步数
    restart-delay-ms: 2000                   # agent.run() 退出后重启前的等待间隔（毫秒）
    excluded-tools:                          # 队友创建时排除的工具（防止递归委派/无限唤醒）
      - delegateTask
      - spawnTeammate